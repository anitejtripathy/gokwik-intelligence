<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agency Model — GoKwik Intelligence</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<nav>
  <a class="brand" href="index.html">GoKwik Intelligence</a>
  <a href="index.html">Overview</a>
  <a href="agency.html" class="active">Agency Model</a>
  <a href="content.html">Content</a>
  <a href="audience.html">Audience</a>
  <a href="value-map.html">Value Map</a>
  <a href="engagement.html">Engagement</a>
</nav>
<div class="container">
  <h1>Agency Business Model</h1>
  <p class="subtitle" id="summary">Loading...</p>
  <h2>Revenue Streams</h2>
  <div id="revenue-streams"></div>
  <h2>Content Strategy Playbook</h2>
  <div class="card"><ul class="summary-list" id="playbook"></ul></div>
  <h2>Validated Success Stories</h2>
  <div id="success-stories"></div>
</div>
<script>
fetch('data/agency_context.json').then(r => r.json()).then(data => {
  document.getElementById('summary').textContent = data.business_model_summary || '';
  const conf = c => `<span class="confidence-${c}">${c}</span>`;
  document.getElementById('revenue-streams').innerHTML = (data.revenue_streams||[]).map(rs => `
    <div class="card">
      <h3>${rs.type} ${conf(rs.confidence)}</h3>
      <p>${rs.description}</p>
      <p style="font-size:0.8rem;font-style:italic">${rs.evidence}</p>
    </div>`).join('');
  document.getElementById('playbook').innerHTML = (data.content_strategy_playbook||[]).map(p => `<li>${p}</li>`).join('');
  document.getElementById('success-stories').innerHTML = (data.validated_success_stories||[]).map(s => `
    <div class="card">
      <h3>${s.brand}</h3>
      <p><strong>Outcome:</strong> ${s.outcome}</p>
      <p><strong>Mechanism:</strong> ${s.mechanism}</p>
      <p style="font-size:0.8rem"><a href="${s.source}" style="color:var(--accent)" target="_blank">${s.source}</a></p>
    </div>`).join('');
});
</script>
</body>
</html>
